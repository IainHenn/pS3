services:
  postgres:
    image: postgres:16-alpine
    container_name: ps3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ps3}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ps3}
      POSTGRES_DB: ${POSTGRES_DB:-ps3}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ps3} -d ${POSTGRES_DB:-ps3}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ps3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps3-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
      - "${GRPC_PORT:-50051}:50051"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      POSTGRES_HOST: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-ps3}:${POSTGRES_PASSWORD:-ps3}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ps3}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
